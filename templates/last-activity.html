<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Última Atividade - Fitness Rabbit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
    <div class="min-h-screen py-12 px-4">
        <div class="max-w-2xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <a href="/" class="text-orange-500 hover:text-orange-400 font-semibold">← Voltar</a>
            </div>

            <!-- Activity Card -->
            <div class="bg-zinc-900 rounded-2xl p-8 border border-zinc-800 shadow-2xl">
                <h1 class="text-4xl font-bold mb-2">{{ activity_name }}</h1>
                <p class="text-zinc-400 text-sm mb-6">{{ activity_date }}</p>

                <!-- Stats Grid -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 pb-8 border-b border-zinc-800">
                    <div class="bg-zinc-800 rounded-lg p-4">
                        <p class="text-zinc-400 text-xs font-semibold uppercase mb-2">Distância</p>
                        <p class="text-3xl font-bold text-orange-500">{{ distance_km }}km</p>
                    </div>
                    <div class="bg-zinc-800 rounded-lg p-4">
                        <p class="text-zinc-400 text-xs font-semibold uppercase mb-2">Duração</p>
                        <p class="text-3xl font-bold text-orange-500">{{ duration_min }}</p>
                    </div>
                    <div class="bg-zinc-800 rounded-lg p-4">
                        <p class="text-zinc-400 text-xs font-semibold uppercase mb-2">Elevação</p>
                        <p class="text-3xl font-bold text-orange-500">{{ elevation_m }}m</p>
                    </div>
                    <div class="bg-zinc-800 rounded-lg p-4">
                        <p class="text-zinc-400 text-xs font-semibold uppercase mb-2">Pace</p>
                        <p class="text-3xl font-bold text-orange-500">{{ pace_min }}</p>
                    </div>
                </div>

                <!-- CTA Button -->
                <button onclick="generateFeedback()" 
                        id="feedbackBtn"
                        class="w-full bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white font-bold py-4 px-6 rounded-xl text-lg transition-colors duration-200 shadow-lg hover:shadow-xl">
                    🐰 Gerar Feedback do Rabbit
                </button>

                <!-- Feedback Section -->
                <div id="feedbackContainer" class="mt-8 hidden">
                    <div class="bg-zinc-800 rounded-xl p-6 border border-zinc-700">
                        <h2 class="text-xl font-bold mb-4 text-orange-500">Feedback do Rabbit 🐰</h2>
                        <div id="feedback" class="text-zinc-100 leading-relaxed whitespace-pre-wrap"></div>
                    </div>
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="mt-8 hidden text-center">
                    <div class="inline-flex items-center gap-2">
                        <div class="w-3 h-3 bg-orange-500 rounded-full animate-bounce"></div>
                        <p class="text-zinc-400">Analisando sua corrida...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generateFeedback() {
            const btn = document.getElementById('feedbackBtn');
            const feedbackContainer = document.getElementById('feedbackContainer');
            const loadingState = document.getElementById('loadingState');
            const feedbackDiv = document.getElementById('feedback');

            btn.disabled = true;
            feedbackContainer.classList.add('hidden');
            loadingState.classList.remove('hidden');

            try {
                const res = await fetch('/generate-feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({{ activity_json }})
                });
                
                const data = await res.json();
                feedbackDiv.textContent = data.feedback;
                loadingState.classList.add('hidden');
                feedbackContainer.classList.remove('hidden');
                btn.textContent = '✨ Gerar Novamente';
            } catch (error) {
                feedbackDiv.textContent = 'Oops! Algo deu errado. Tente novamente.';
                loadingState.classList.add('hidden');
                feedbackContainer.classList.remove('hidden');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
